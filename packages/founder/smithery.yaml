name: "@autostackup/founder"
description: "All Autostackup tools in one server: sales, marketing, HR + launch playbook, weekly briefing & investor pitch."
type: stdio
command: npx
args:
  - "-y"
  - "@autostackup/founder"
config:
  HUNTER_API_KEY:
    type: string
    description: "Hunter.io API key for lead enrichment (optional)"
    required: false
    secret: true
  APOLLO_API_KEY:
    type: string
    description: "Apollo.io API key for contact enrichment (optional)"
    required: false
    secret: true
